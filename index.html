<style>
    .gvardia-board-section {
        max-width: 600px;
        width: 90%;
        margin: 50px auto 30px auto;
        font-family: 'Segoe UI', sans-serif;
        box-sizing: border-box;
        clear: both;
    }
    .gvardia-board-title {
        width: 100%;
        background: none;
        border: none;
        color: #FFD700;
        text-transform: uppercase;
        font-size: 18px;
        text-align: center;
        margin-bottom: 15px;
        letter-spacing: 1px;
        cursor: pointer;
        font-weight: bold;
    }
    .gvardia-board-admin {
        background: rgba(0, 0, 0, 0.95);
        border: 2px solid #ff3333;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 20px;
        box-sizing: border-box;
    }
    .gvardia-board-admin input, .gvardia-board-admin textarea {
        background: #111;
        border: 1px solid #444;
        color: #fff;
        padding: 8px;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
        width: 100%;
    }
    .gvardia-board-admin button {
        background: #ff3333;
        color: #fff;
        border: none;
        padding: 10px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        text-transform: uppercase;
        width: 100%;
    }
    .gvardia-board-surface {
        background-color: #24140a;
        background-image: linear-gradient(90deg, transparent 49%, rgba(0,0,0,0.4) 50%, transparent 51%), linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 70px 100%, 100% 3px;
        border: 12px solid #140b05;
        outline: 2px solid #ff3333;
        border-radius: 4px;
        min-height: 200px;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        align-content: flex-start;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .gvardia-notice {
        background: #FFD700;
        color: #000 !important;
        padding: 12px;
        width: 160px;
        min-height: 140px;
        box-sizing: border-box;
        border-left: 4px solid #ff3333;
        transform: rotate(1deg);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 3px 3px 8px rgba(0,0,0,0.6);
    }
    .gvardia-notice:nth-child(even) {
        background: #ff3333;
        color: #fff !important;
        border-left: 4px solid #FFD700;
        transform: rotate(-1deg);
    }
    .gvardia-notice::before {
        content: '';
        position: absolute;
        top: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        background: #111;
        border-radius: 50%;
    }
    .gvardia-notice-text {
        font-size: 13px;
        font-weight: bold;
        word-break: break-word;
        white-space: pre-wrap;
        text-align: left;
        line-height: 1.3;
    }
    .gvardia-notice-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 9px;
        margin-top: 8px;
        border-top: 1px solid rgba(0,0,0,0.1);
        padding-top: 4px;
    }
    .gvardia-notice:nth-child(even) .gvardia-notice-footer {
        border-top: 1px solid rgba(255,255,255,0.2);
    }
    .gvardia-notice-del {
        background: #000;
        color: #fff;
        border: none;
        padding: 2px 5px;
        cursor: pointer;
        border-radius: 2px;
        font-size: 9px;
    }
</style>

<div class="gvardia-board-section">
    <!-- Одиночный клик по этой кнопке откроет скрытую панель -->
    <button type="button" class="gvardia-board-title" onclick="toggleGvardiaPanel()">
        📌 Доска объявлений командующего
    </button>
    
    <div class="gvardia-board-admin" id="gvardiaPanel" style="display: none;">
        <input type="password" id="gvardiaPin" placeholder="ПИН-код для публикации">
        <textarea id="gvardiaText" placeholder="Текст нового объявления..." rows="2" style="margin-top: 8px; margin-bottom: 8px;"></textarea>
        <button type="button" onclick="addGvardiaNotice()">Опубликовать приказ</button>
    </div>
    
    <div class="gvardia-board-surface" id="gvardiaSurface"></div>
</div>

<script>
    const G_MASTER_PIN = "1690"; 

    function toggleGvardiaPanel() {
        const panel = document.getElementById('gvardiaPanel');
        if (panel) {
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
            drawGvardiaNotices(); 
        }
    }

    window.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.code === 'KeyY') {
            e.preventDefault();
            toggleGvardiaPanel();
        }
    });

    function addGvardiaNotice() {
        const pin = document.getElementById('gvardiaPin');
        const text = document.getElementById('gvardiaText');
        
        if (!pin || !text) return;
        if (pin.value !== G_MASTER_PIN) { 
            alert("Доступ закрыт! Неверный ПИН-код."); 
            return; 
        }
        if (text.value.trim() === "") {
            alert("Пожалуйста, введите текст приказа.");
            return;
        }

        const list = JSON.parse(localStorage.getItem('gvardia_notices_list')) || [];
        list.unshift({ 
            id: Date.now(), 
            text: text.value, 
            date: new Date().toLocaleDateString('ru-RU') 
        });
        
        localStorage.setItem('gvardia_notices_list', JSON.stringify(list));
        text.value = '';
        drawGvardiaNotices();
    }

    function drawGvardiaNotices() {
        const board = document.getElementById('gvardiaSurface');
        if (!board) return;
        
        const list = JSON.parse(localStorage.getItem('gvardia_notices_list')) || [];
        const panel = document.getElementById('gvardiaPanel');
        
        board.innerHTML = '';

        if (list.length === 0) {
            board.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:11px;padding:30px 0;width:100%;text-align:center;">Нет активных объявлений</div>';
            return;
        }

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'gvardia-notice';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'gvardia-notice-text';
            textDiv.textContent = item.text;
            card.appendChild(textDiv);

            const footer = document.createElement('div');
            footer.className = 'gvardia-notice-footer';
            
            const dateDiv = document.createElement('div');
            dateDiv.textContent = item.date;
            footer.appendChild(dateDiv);
            
            if (panel && panel.style.display === 'block') {
                const btn = document.createElement('button');
                btn.className = 'gvardia-notice-del';
                btn.textContent = 'Снять';
                btn.onclick = function() {
                    const checkPin = prompt("Введите ПИН-код для подтверждения удаления:");
                    if (checkPin === G_MASTER_PIN) {
                        let currentList = JSON.parse(localStorage.getItem('gvardia_notices_list')) || [];
                        currentList = currentList.filter(n => n.id !== item.id);
                        localStorage.setItem('gvardia_notices_list', JSON.stringify(currentList));
                        drawGvardiaNotices();
                    } else {
                        alert("Неверный ПИН-код!");
                    }
                };
                footer.appendChild(btn);
            }
            
            card.appendChild(footer);
            board.appendChild(card);
        });
    }

    drawGvardiaNotices();
</script>
<!-- ====================================================================== -->
